<!-- profile.component.html -->
<div class="container-fluid py-4">
  <!-- Header -->
  <div
    class="position-relative rounded-4 p-4 mb-4 overflow-hidden"
    style="
      background:
        radial-gradient(#f5f5f5, #bbbbbb),
        linear-gradient(180deg, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.25));
      border: 1px solid rgba(255, 255, 255, 0.08);
    "
  >
    <div
      class="d-flex flex-column flex-md-row align-items-start align-items-md-center justify-content-between gap-3"
    >
      <div class="d-flex align-items-center gap-3">
        <!-- Avatar -->
        <div
          class="rounded-circle d-flex align-items-center justify-content-center"
        >
          <p-avatar
            icon="pi pi-user"
            styleClass="mr-2"
            size="xlarge"
            shape="circle"
          />
          <!-- Si quieres imagen: <img [src]="" class="rounded-circle w-100 h-100" style="object-fit:cover"> -->
        </div>

        <!-- Identity -->
        <div class="text-black">
          <div class="fs-4 fw-semibold lh-1">
            {{ data.firstName }} {{ data.lastName }}
          </div>
          <div class="small">{{ data.email }}</div>
          <div class="mt-2">
            <p-tag
              [value]="data.deleted ? 'Inactivo' : 'Activo'"
              [severity]="data.deleted ? 'danger' : 'success'"
              styleClass="px-3 py-1"
            >
            </p-tag>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tabs + Content -->
  <div
    class="rounded-4 p-3 p-md-4"
    style="
      background: rgba(192, 192, 192, 0.03);
      color: #4a4848;
      border: 1px solid rgba(255, 255, 255, 0.08);
    "
  >
    <p-tabView styleClass="w-100">
      <!-- TAB 1: Información personal -->
      <p-tabPanel header="Información personal">
        <div class="pt-2">
          <form [formGroup]="form" id="form">
            <div class="row g-3 g-md-4">
              <div class="col-12 col-md-6">
                <label class="form-label small mb-1">Nombre</label>
                <input
                  pInputText
                  formControlName="firstName"
                  class="form-control"
                  [disabled]="true"
                  [value]="data.firstName"
                />
              </div>

              <div class="col-12 col-md-6">
                <label class="form-label small mb-1">Apellidos</label>
                <input
                  pInputText
                  formControlName="lastName"
                  class="form-control"
                  [disabled]="true"
                  [value]="data.lastName"
                />
              </div>

              <div class="col-12 col-md-12">
                <div class="row">
                  <div class="col-4 col-md-4">
                    <label class="form-label small mb-1">Email</label>
                    <input
                      pInputText
                      formControlName="email"
                      class="form-control"
                      [disabled]="true"
                      [value]="data.email"
                    />
                  </div>

                  <div class="col-4 col-md-4">
                    <label class="form-label small mb-1">Teléfono</label>
                    <p-inputMask
                      mask="999-999-99-99"
                      styleClass="form-control"
                      formControlName="phoneNumber"
                      placeholder="999-999-99-99"
                    />
                  </div>

                  <div class="col-4 col-md-4">
                    <label class="form-label small mb-1"
                      >Fecha de nacimiento</label
                    >
                    <input
                      type="date"
                      formControlName="birth"
                      class="form-control"
                    />
                  </div>
                </div>
              </div>

              <div class="col-12 col-md-12">
                <div class="row">
                  <div class="col-4 col-md-4">
                    <div class="form-group">
                      <label class="form-label small mb-1">País</label>
                      <select
                        class="form-select"
                        aria-label="País"
                        formControlName="country"
                        (change)="onChange($event, 'country', 'state')"
                      >
                        <option
                          *ngFor="let option of countrys"
                          [value]="option._id"
                        >
                          {{ option.name }}
                        </option>
                      </select>
                    </div>
                  </div>
                  <div class="col-4 col-md-4">
                    <div class="form-group">
                      <label class="form-label small mb-1">Estado</label>
                      <select
                        class="form-select"
                        aria-label="Estado"
                        formControlName="state"
                        (change)="onChange($event, 'state', 'municipality')"
                      >
                        <option
                          *ngFor="let option of states"
                          [value]="option._id"
                        >
                          {{ option.name }}
                        </option>
                      </select>
                    </div>
                  </div>
                  <div class="col-4 col-md-4">
                    <div class="form-group">
                      <label class="form-label small mb-1">Municipio</label>
                      <select
                        class="form-select"
                        aria-label="Municipio"
                        formControlName="municipality"
                        (change)="onChange($event, 'municipality')"
                      >
                        <option
                          *ngFor="let option of municipalitys"
                          [value]="option._id"
                        >
                          {{ option.name }}
                        </option>
                      </select>
                    </div>
                  </div>
                </div>
              </div>

              <div class="col-12">
                <label class="form-label small mb-1">Dirección</label>
                <input
                  pInputText
                  formControlName="addressStreet"
                  class="form-control"
                  [disabled]="true"
                  [value]=""
                />
              </div>
            </div>

            <button
              class="btn btn-fill btn-danger"
              type="submit"
              [disabled]="form.invalid"
              (click)="saveUser()"
            >
              Guardar
            </button>
          </form>
        </div>
      </p-tabPanel>

      <!-- TAB 2: Seguridad -->
      <p-tabPanel header="Seguridad">
        <div class="pt-3 text-white-50">
          <!-- Aquí puedes meter: cambio de contraseña, 2FA, sesiones activas, etc. -->
          <div
            class="alert alert-dark border-0 mb-0"
            style="
              background: rgba(255, 255, 255, 0.04);
              color: rgba(255, 255, 255, 0.7);
            "
          >
            Configuración de seguridad (pendiente).
          </div>
        </div>
      </p-tabPanel>

      <!-- TAB 3: Wallet -->
      <p-tabPanel header="Wallet">
        <div class="pt-3 text-white-50">
          <div
            class="alert alert-dark border-0 mb-0"
            style="
              background: rgba(255, 255, 255, 0.04);
              color: rgba(255, 255, 255, 0.7);
            "
          >
            Información de wallet (pendiente).
          </div>
        </div>
      </p-tabPanel>

      <!-- TAB 4: Suscripción -->
      <p-tabPanel header="Suscripción">
        <div class="pt-3 text-white-50">
          <div
            class="alert alert-dark border-0 mb-0"
            style="
              background: rgba(255, 255, 255, 0.04);
              color: rgba(255, 255, 255, 0.7);
            "
          >
            Información de suscripción (pendiente).
          </div>
        </div>
      </p-tabPanel>
    </p-tabView>
  </div>
</div>
